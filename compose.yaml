services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: autoboard
      POSTGRES_USER: autoboard
      POSTGRES_PASSWORD: autoboard
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoboard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
